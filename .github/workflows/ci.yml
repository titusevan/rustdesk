name: CI-FULL-BUILD

on:
  workflow_dispatch:
  push:
    branches: [ master ]

jobs:
  build:
    name: Build Windows Production
    runs-on: windows-2022

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install NASM
        uses: ilammy/setup-nasm@v1

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: vcpkg setup
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: '120deac3062162151622ca4860575a33844ba10b'

      - name: Install vcpkg dependencies
        shell: bash
        run: |
          $VCPKG_ROOT/vcpkg install libvpx libyuv opus aom dav1d --triplet x64-windows-static --classic

      - name: Cargo Build (Full Production)
        shell: bash
        env:
          RS_ID_SERVER: ${{ secrets.RS_ID_SERVER }}
          RS_PUB_KEY: ${{ secrets.RS_PUB_KEY }}
          VCPKG_ROOT: ${{ github.workspace }}/vcpkg
          VCPKGRS_DYNAMIC: 0
        run: |
          # Добавляем --features inline для иконок и интерфейса
          cargo build --release --locked --target x86_64-pc-windows-msvc --features inline

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RustDesk-Final-EXE
          # Теперь берем только один главный файл
          path: target/x86_64-pc-windows-msvc/release/rustdesk.exe
