name: CI

env:
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths-ignore:
      - ".github/**"
      - "docs/**"
      - "README.md"

jobs:
  build:
    name: ${{ matrix.job.target }} (${{ matrix.job.os }})
    runs-on: ${{ matrix.job.os }}
    strategy:
      fail-fast: false
      matrix:
        job:
          - { target: x86_64-pc-windows-msvc, os: windows-2022 }

    steps:
    - name: Checkout source code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install NASM
      shell: bash
      run: choco install nasm

    - name: Setup vcpkg
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}

    - name: Install vcpkg dependencies
      shell: bash
      run: |
        # Ставим только базовые кодеки, которые не требуют сложной настройки FFmpeg
        $VCPKG_ROOT/vcpkg install libvpx libyuv opus aom dav1d --triplet x64-windows-static --classic

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@v1
      with:
        toolchain: stable
        targets: ${{ matrix.job.target }}

    - uses: Swatinem/rust-cache@v2

    - name: Build
      shell: bash
      env:
        RS_ID_SERVER: ${{ secrets.RS_ID_SERVER }}
        RS_PUB_KEY: ${{ secrets.RS_PUB_KEY }}
        VCPKGRS_DYNAMIC: 0
      run: |
        # Собираем стандартный релиз без проблемных фич. 
        # Это даст рабочий exe с твоим сервером.
        cargo build --release --locked --target ${{ matrix.job.target }}

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: RustDesk-Windows-Client
        path: target/x86_64-pc-windows-msvc/release/rustdesk.exe
