name: CI

env:
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths-ignore:
      - ".github/**"
      - "docs/**"
      - "README.md"

jobs:
  build:
    name: ${{ matrix.job.target }} (${{ matrix.job.os }})
    runs-on: ${{ matrix.job.os }}
    strategy:
      fail-fast: false
      matrix:
        job:
          # Собираем Windows (клиент с UI) и Linux
          - { target: x86_64-pc-windows-msvc, os: windows-2022 }
          - { target: x86_64-unknown-linux-gnu, os: ubuntu-24.04 }

    steps:
    - name: Free Disk Space (Ubuntu)
      if: runner.os == 'Linux'
      uses: jlumbroso/free-disk-space@v1.3.1
      with:
        tool-cache: false
        android: true
        dotnet: true
        haskell: true
        large-packages: false
        docker-images: true
        swap-storage: false

    - name: Export GitHub Actions cache environment variables
      uses: actions/github-script@v6
      with:
        script: |
          core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
          core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

    - name: Checkout source code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install prerequisites
      shell: bash
      run: |
        if [ "${{ runner.os }}" == "Linux" ]; then
          sudo apt-get -y update
          sudo apt-get install -y clang cmake curl gcc git g++ libpam0g-dev libasound2-dev libunwind-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev libgtk-3-dev libpulse-dev libva-dev libvdpau-dev libxcb-randr0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxdo-dev libxfixes-dev nasm wget
        elif [ "${{ runner.os }}" == "Windows" ]; then
          # Устанавливаем NASM для Windows
          choco install nasm
        fi

    - name: Setup vcpkg
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}

    - name: Install vcpkg dependencies
      shell: bash
      run: |
        if [ "${{ runner.os }}" == "Windows" ]; then
          # Добавили ffmpeg — это решит проблему с libavcodec/avcodec.h
          $VCPKG_ROOT/vcpkg install libvpx libyuv opus aom dav1d ffmpeg --triplet x64-windows-static --classic
        else
          $VCPKG_ROOT/vcpkg install --x-install-root="$VCPKG_ROOT/installed"
        fi

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@v1
      with:
        toolchain: stable
        targets: ${{ matrix.job.target }}

    - uses: Swatinem/rust-cache@v2

    - name: Build
      shell: bash
      env:
        # Твои секреты сервера
        RS_ID_SERVER: ${{ secrets.RS_ID_SERVER }}
        RS_PUB_KEY: ${{ secrets.RS_PUB_KEY }}
        VCPKGRS_DYNAMIC: 0
      run: |
        if [ "${{ runner.os }}" == "Windows" ]; then
          # Собираем с флагом hwcodec для подтяжки ресурсов и иконки
          cargo build --release --locked --target ${{ matrix.job.target }} --features hwcodec
        else
          cargo build --release --locked --target ${{ matrix.job.target }}
        fi

    - name: Upload Artifacts (Windows)
      if: matrix.job.target == 'x86_64-pc-windows-msvc'
      uses: actions/upload-artifact@v4
      with:
        name: RustDesk-Windows-Final
        path: target/x86_64-pc-windows-msvc/release/rustdesk.exe
