Name: CI

env:
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  build:
    name: ${{ matrix.job.target }} (${{ matrix.job.os }})
    runs-on: ${{ matrix.job.os }}
    strategy:
      fail-fast: false
      matrix:
        job:
          # Windows бинарник (.exe)
          - { target: x86_64-pc-windows-msvc, os: windows-2022 }
          # Linux бинарник
          - { target: x86_64-unknown-linux-gnu, os: ubuntu-24.04 }
          # Android бинарник (.apk)
          - { target: aarch64-linux-android, os: ubuntu-latest }

    steps:
    - name: Checkout source code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Export Secrets for RustDesk
      shell: bash
      run: |
        echo "RS_ID_SERVER=${{ secrets.RS_ID_SERVER }}" >> $GITHUB_ENV
        echo "RS_PUB_KEY=${{ secrets.RS_PUB_KEY }}" >> $GITHUB_ENV

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@v1
      with:
        toolchain: stable
        targets: ${{ matrix.job.target }}

    # Для Android нужны дополнительные инструменты (NDK)
    - name: Set up Android NDK
      if: contains(matrix.job.target, 'android')
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r25c

    - name: Build
      uses: actions-rs/cargo@v1
      env:
        RS_ID_SERVER: ${{ secrets.RS_ID_SERVER }}
        RS_PUB_KEY: ${{ secrets.RS_PUB_KEY }}
      with:
        use-cross: ${{ matrix.job.use-cross }}
        command: build
        args: --release --locked --target=${{ matrix.job.target }}

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: RustDesk-${{ matrix.job.target }}
        path: |
          target/${{ matrix.job.target }}/release/*.exe
          target/${{ matrix.job.target }}/release/*.apk
          target/${{ matrix.job.target }}/release/rustdesk
